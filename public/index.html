<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalshi Manual Scalper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .kbd-key {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            font-size: 0.875rem;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 0.25rem;
            box-shadow: 0 2px 0 #94a3b8;
        }
        .toast-enter { animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-xl bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700 relative">
        
        <!-- Header & Market Status -->
        <div class="p-6 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="zap" class="text-yellow-400"></i>
                    Kalshi Scalper
                </h1>
                <span id="connection-status" class="px-3 py-1 bg-yellow-500/20 text-yellow-400 text-xs font-bold rounded-full border border-yellow-500/30 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span> Connecting...
                </span>
            </div>
            
            <div class="mt-4 bg-slate-900 rounded-lg p-4 flex flex-col gap-1 border border-slate-700">
                <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Target Market</span>
                <div class="flex items-center gap-3">
                    <span id="market-ticker" class="text-xl font-mono text-white font-bold tracking-tight">Loading...</span>
                    <button onclick="fetchMarket()" class="p-1.5 hover:bg-slate-700 rounded-md transition-colors" title="Refresh Market">
                        <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-400"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Configuration Panel -->
        <div class="p-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                
                <!-- Side Selection -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Target Side</label>
                    <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
                        <button id="btn-side-yes" onclick="setSide('YES')" class="flex-1 py-2 text-sm font-bold rounded-md transition-all bg-green-500/20 text-green-400 border border-green-500/50 shadow-sm">YES</button>
                        <button id="btn-side-no" onclick="setSide('NO')" class="flex-1 py-2 text-sm font-bold rounded-md transition-all text-slate-400 hover:text-white">NO</button>
                    </div>
                </div>

                <!-- Contract Count -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Size (Contracts)</label>
                    <input type="number" id="input-count" value="1" min="1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white font-mono text-lg focus:outline-none focus:border-slate-500 transition-colors">
                </div>
            </div>

            <!-- Pre-set Prices -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-blue-300 flex justify-between">
                        <span>Buy Limit Price</span>
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-slate-400 font-mono text-lg">&cent;</span>
                        <input type="number" id="input-buy-price" value="50" min="1" max="99" class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-4 py-2.5 text-white font-mono text-lg focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-red-300 flex justify-between">
                        <span>Sell Limit Price</span>
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-slate-400 font-mono text-lg">&cent;</span>
                        <input type="number" id="input-sell-price" value="50" min="1" max="99" class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-4 py-2.5 text-white font-mono text-lg focus:outline-none focus:border-red-500 transition-colors">
                    </div>
                </div>
            </div>
        </div>

        <!-- Hotkey Legend -->
        <div class="bg-slate-900 p-4 border-t border-slate-700">
            <div class="flex justify-center gap-8">
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <kbd class="kbd-key flex items-center gap-1"><i data-lucide="arrow-up" class="w-4 h-4"></i></kbd>
                    <span>Execute <strong class="text-blue-400">BUY</strong></span>
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-300">
                    <kbd class="kbd-key flex items-center gap-1"><i data-lucide="arrow-down" class="w-4 h-4"></i></kbd>
                    <span>Execute <strong class="text-red-400">SELL</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // State
        let currentSide = 'YES';
        let currentTicker = null;
        let isExecuting = false;

        // UI Elements
        const btnSideYes = document.getElementById('btn-side-yes');
        const btnSideNo = document.getElementById('btn-side-no');
        const inputCount = document.getElementById('input-count');
        const inputBuyPrice = document.getElementById('input-buy-price');
        const inputSellPrice = document.getElementById('input-sell-price');
        const elTicker = document.getElementById('market-ticker');
        const elStatus = document.getElementById('connection-status');

        // Toggle Contract Side
        function setSide(side) {
            currentSide = side;
            if (side === 'YES') {
                btnSideYes.className = "flex-1 py-2 text-sm font-bold rounded-md transition-all bg-green-500/20 text-green-400 border border-green-500/50 shadow-sm";
                btnSideNo.className = "flex-1 py-2 text-sm font-bold rounded-md transition-all text-slate-400 hover:text-white";
            } else {
                btnSideNo.className = "flex-1 py-2 text-sm font-bold rounded-md transition-all bg-red-500/20 text-red-400 border border-red-500/50 shadow-sm";
                btnSideYes.className = "flex-1 py-2 text-sm font-bold rounded-md transition-all text-slate-400 hover:text-white";
            }
        }

        // Fetch Market Data from Backend
        async function fetchMarket() {
            elTicker.innerText = "Loading...";
            elStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span> Connecting...`;
            elStatus.className = "px-3 py-1 bg-yellow-500/20 text-yellow-400 text-xs font-bold rounded-full border border-yellow-500/30 flex items-center gap-2";

            try {
                // CACHE BUSTER: Prevents browser from showing old 304 errors
                const response = await fetch('/api/market?t=' + Date.now(), {
                    headers: { 'Accept': 'application/json' }
                });
                
                const text = await response.text();
                
                if (!text) {
                    throw new Error(`Server returned empty response (Status: ${response.status})`);
                }

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    // Forcefully display exactly what the backend sent so we can see the issue
                    let preview = text.substring(0, 100).replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    throw new Error(`Non-JSON Response (${response.status}): ${preview}`);
                }

                if (response.ok && data.market) {
                    currentTicker = data.market.ticker;
                    elTicker.innerText = currentTicker;
                    elStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400"></span> Live`;
                    elStatus.className = "px-3 py-1 bg-green-500/20 text-green-400 text-xs font-bold rounded-full border border-green-500/30 flex items-center gap-2";
                } else {
                    elTicker.innerText = "No Market Found";
                    elStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400"></span> Error`;
                    elStatus.className = "px-3 py-1 bg-red-500/20 text-red-400 text-xs font-bold rounded-full border border-red-500/30 flex items-center gap-2";
                    showToast(data.error || "Failed to fetch market from Kalshi", "error");
                }
            } catch (err) {
                // If the connection ACTUALLY breaks, show the true error
                elTicker.innerText = "Error - Check Toast";
                showToast(`Error: ${err.message}`, "error");
            }
        }

        // Execute Order
        async function executeTrade(action) {
            if (isExecuting) return;
            if (!currentTicker) {
                showToast("Cannot trade: No active market loaded.", "error");
                return;
            }

            const count = inputCount.value;
            // Fetch the specific price based on the action (buy or sell)
            const price = action === 'buy' ? inputBuyPrice.value : inputSellPrice.value;
            
            if (!count || count < 1 || !price || price < 1) {
                showToast("Invalid count or price.", "error");
                return;
            }

            isExecuting = true;
            showToast(`Sending ${action.toUpperCase()} order for ${count} ${currentSide} at &cent;${price}...`, "info");

            try {
                const response = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        ticker: currentTicker,
                        action: action,
                        side: currentSide,
                        count: count,
                        max_price: price
                    })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    let preview = text.substring(0, 100).replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    throw new Error(`Non-JSON Response (${response.status}): ${preview}`);
                }

                if (response.ok && data.success) {
                    showToast(`âœ… Successfully placed ${action.toUpperCase()} order!`, "success");
                } else {
                    throw new Error(data.error || "Order execution failed");
                }
            } catch (err) {
                showToast(`âŒ Error: ${err.message}`, "error");
            } finally {
                isExecuting = false;
            }
        }

        // Toast Notification System
        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = "bg-slate-800 border-slate-600";
            if (type === "success") bgClass = "bg-green-900/80 border-green-500 text-green-100";
            if (type === "error") bgClass = "bg-red-900/80 border-red-500 text-red-100";
            if (type === "info") bgClass = "bg-blue-900/80 border-blue-500 text-blue-100";

            toast.className = `toast-enter flex items-center p-4 rounded-lg shadow-lg border ${bgClass} text-sm font-medium min-w-[300px] backdrop-blur-sm`;
            toast.innerHTML = message;
            
            container.appendChild(toast);
            
            // Remove after 6s for longer error messages
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 6000); 
        }

        // Hotkey Event Listener
        document.addEventListener('keydown', (e) => {
            // Prevent hotkeys from triggering while typing in input boxes
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'ArrowUp') {
                e.preventDefault(); // Stop page scrolling
                executeTrade('buy');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault(); // Stop page scrolling
                executeTrade('sell');
            }
        });

        // Initialize on load
        fetchMarket();
        // Refresh market periodically (every 30 seconds)
        setInterval(fetchMarket, 30000);

    </script>
</body>
</html>
